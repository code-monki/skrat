name: CI

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]

permissions:
  contents: write # publish-release (fork PRs still get a read-only token)
  actions: write # upload-artifact, download-artifact

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # Debian-family: native x86_64 and aarch64 (GitHub-hosted ARM runners are for public repos).
  ubuntu:
    name: Ubuntu 24.04 (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04, arch: x86_64, artifact: ubuntu-x86_64 }
          - { runner: ubuntu-24.04-arm, arch: aarch64, artifact: ubuntu-aarch64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            libgl1-mesa-dev \
            qt6-base-dev \
            qt6-pdf-dev
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skrat-${{ matrix.artifact }}
          path: build/skrat
          if-no-files-found: error

  # Fedora in Docker: amd64 image on x64 runner, aarch64 image on ARM runner.
  fedora:
    name: Fedora (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04, arch: x86_64, artifact: fedora-x86_64 }
          - { runner: ubuntu-24.04-arm, arch: aarch64, artifact: fedora-aarch64 }
    runs-on: ${{ matrix.runner }}
    container:
      image: fedora:latest
    steps:
      - name: Install git (for checkout)
        run: dnf -y install git-core ca-certificates
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          dnf -y install \
            cmake \
            gcc-c++ \
            ninja-build \
            qt6-qtbase-devel \
            qt6-qtpdf-devel
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skrat-${{ matrix.artifact }}
          path: build/skrat
          if-no-files-found: error

  macos-universal:
    name: macOS (universal)
    runs-on: macos-latest
    env:
      CMAKE_OSX_ARCHITECTURES: arm64;x86_64
    steps:
      - uses: actions/checkout@v4
      - name: Install Ninja
        run: brew install ninja
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          cache: true
          modules: qtpdf
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel
      - name: Verify Mach-O architectures
        run: lipo -info build/skrat
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skrat-macos-universal
          path: build/skrat
          if-no-files-found: error

  windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          arch: win64_msvc2022_64
          cache: true
          modules: qtpdf
      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skrat-windows-x86_64
          path: build/Release/skrat.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    needs:
      - ubuntu
      - fedora
      - macos-universal
      - windows
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: skrat-*
      - name: Package assets for Releases
        run: |
          set -euo pipefail
          mkdir -p upload
          shopt -s nullglob
          for d in release-assets/skrat-*; do
            [ -d "$d" ] || continue
            name=$(basename "$d")
            exe=$(find "$d" -type f -name 'skrat.exe' -print -quit)
            bin=$(find "$d" -type f -name 'skrat' -print -quit)
            if [ -n "${exe}" ]; then
              zip -j "upload/${name}.zip" "${exe}"
            elif [ -n "${bin}" ]; then
              tar -czf "upload/${name}.tar.gz" -C "$(dirname "${bin}")" "$(basename "${bin}")"
            fi
          done
          ls -la upload
          if [ -z "$(find upload -type f | head -1)" ]; then
            echo "No release assets were produced."
            exit 1
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: skrat ${{ github.ref_name }}
          generate_release_notes: true
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
