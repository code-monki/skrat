<?xml version="1.0" encoding="UTF-8"?>
<!-- skrat: acorn + two tooth marks (homage). Rasterize to hicolor PNGs via packaging/icons/export-pngs.sh -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a3020"/>
      <stop offset="100%" stop-color="#1f120c"/>
    </linearGradient>
    <linearGradient id="nutGrad" x1="35%" y1="0%" x2="65%" y2="100%">
      <stop offset="0%" stop-color="#f0d4a0"/>
      <stop offset="50%" stop-color="#c9a066"/>
      <stop offset="100%" stop-color="#7a4f2e"/>
    </linearGradient>
    <radialGradient id="shine" cx="38%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#fff8ee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fff8ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d6a9e"/>
      <stop offset="100%" stop-color="#1e3a5c"/>
    </linearGradient>
    <!-- two circular "bites" cut from the nut -->
    <mask id="nutWithBites" maskUnits="userSpaceOnUse" x="0" y="0" width="256" height="256">
      <rect width="256" height="256" fill="white"/>
      <circle cx="76" cy="162" r="24" fill="black"/>
      <circle cx="180" cy="162" r="24" fill="black"/>
    </mask>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#bgGrad)"/>
  <!-- nut (ellipse minus two bite circles) -->
  <ellipse cx="128" cy="158" rx="54" ry="70" fill="url(#nutGrad)" stroke="#4a3018" stroke-width="2.5" mask="url(#nutWithBites)"/>
  <ellipse cx="128" cy="158" rx="54" ry="70" fill="url(#shine)" mask="url(#nutWithBites)"/>
  <!-- subtle bite shadow rings -->
  <circle cx="76" cy="162" r="24" fill="none" stroke="#2a1810" stroke-width="2" stroke-opacity="0.35"/>
  <circle cx="180" cy="162" r="24" fill="none" stroke="#2a1810" stroke-width="2" stroke-opacity="0.35"/>
  <!-- cap -->
  <path fill="url(#capGrad)" stroke="#0d0806" stroke-width="2" stroke-linejoin="round"
        d="M 56 96
           C 56 58 200 58 200 96
           C 200 112 178 122 128 122
           C 78 122 56 112 56 96 Z"/>
  <ellipse cx="92" cy="82" rx="11" ry="7" fill="#352218" opacity="0.55"/>
  <ellipse cx="128" cy="76" rx="14" ry="8" fill="#352218" opacity="0.5"/>
  <ellipse cx="164" cy="82" rx="11" ry="7" fill="#352218" opacity="0.55"/>
  <ellipse cx="128" cy="56" rx="9" ry="15" fill="#1a100a"/>
</svg>
